name    = Langertha-Skeid
author  = Torsten Raudssus <torsten@raudssus.de> L<https://raudssus.de/>
license = Perl_5
copyright_holder = Torsten Raudssus
copyright_year   = 2026

; Getty release command:
;   /storage/raid/home/getty/perl5/bin/dzil release
; Optional Docker overrides during release:
;   SKEID_DOCKER_BUILD_ARGS='--build-arg LANGERTHA_SRC=GETTY/Langertha-0.307.tar.gz --build-arg KNARR_SRC=GETTY/Langertha-Knarr-0.006.tar.gz' /storage/raid/home/getty/perl5/bin/dzil release

[@Author::GETTY]
run_after_release = docker build ${SKEID_DOCKER_BUILD_ARGS:-} -t raudssus/langertha-skeid:%v -t raudssus/langertha-skeid:latest -t raudssus/langertha-skeid:$(echo %v | cut -d. -f1) %d
run_after_release = docker push raudssus/langertha-skeid:%v
run_after_release = docker push raudssus/langertha-skeid:$(echo %v | cut -d. -f1)
run_after_release = docker push raudssus/langertha-skeid:latest
