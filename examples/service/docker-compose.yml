version: '3.9'

services:
  openbao:
    image: openbao/openbao:latest
    container_name: skeid-openbao
    restart: unless-stopped
    environment:
      # Dev mode - single server with file backend
      BAO_DEV_ROOT_TOKEN: skeid-root-token
    volumes:
      - openbao-data:/opt/openbao/file
    ports:
      - "5501:8200"
    healthcheck:
      test: ["CMD-SHELL", "bao status -address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
    init: true

  postgres:
    image: postgres:16-alpine
    container_name: skeid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: skeid
      POSTGRES_USER: skeid
      # Password via env - in prod use docker secret
      POSTGRES_PASSWORD: skeid_password_change_me
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5533:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skeid -d skeid"]
      interval: 10s
      timeout: 5s
      retries: 5

  skeid-init:
    image: raudssus/langertha-skeid:latest
    container_name: skeid-init
    restart: "no"
    depends_on:
      openbao:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      OPENBAO_ADDR: http://openbao:5501
      OPENBAO_ROOT_TOKEN: skeid-root-token
      # These are written to OpenBao KV - secrets for app to use
      # In prod: use docker secret or external init
      SKEID_OPENAI_KEY: ${SKEID_OPENAI_KEY:-}
      SKEID_ANTHROPIC_KEY: ${SKEID_ANTHROPIC_KEY:-}
    volumes:
      - ./skeid.yaml:/etc/skeid/skeid.yaml:ro
      - ./init-skeid.sh:/usr/local/bin/init-skeid.sh:ro
      - ./usage_schema.sql:/etc/skeid/usage_schema.sql:ro
    entrypoint: ["/usr/local/bin/init-skeid.sh"]
    # Only run once - disable after
    profiles:
      - init

  skeid:
    image: raudssus/langertha-skeid:latest
    container_name: skeid-proxy
    restart: unless-stopped
    depends_on:
      openbao:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "5591:8090"
    environment:
      # OpenBao connection (AppRole auth - token in memory only)
      OPENBAO_ADDR: http://openbao:5501
      OPENBAO_ROLE_ID: ${OPENBAO_ROLE_ID}
      OPENBAO_SECRET_ID: ${OPENBAO_SECRET_ID}

      # Admin API for /skeid/* routes
      SKEID_ADMIN_API_KEY: ${SKEID_ADMIN_API_KEY:-change-me-in-prod}

      # PostgreSQL usage store
      SKEID_USAGE_DB: "dbi:Pg:dbname=skeid;host=postgres;port=5432"
      SKEID_USAGE_DB_PASSWORD: skeid_password_change_me

      # Remote LLM key - path in OpenBao
      SKEID_REMOTE_KEY_REF: secret/skeid/remote/openai
    volumes:
      - ./skeid.yaml:/etc/skeid/skeid.yaml:ro
      - skeid-usage:/data/skeid
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  openbao-data:
  postgres-data:
  skeid-usage: